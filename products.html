<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foresty Product Layout</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #e8f2e5;
        color: #2f3e2c;
    }

    .container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        padding: 30px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .product {
        background: #f4f8f2;
        border: 2px solid #c7d8c2;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product:hover {
        transform: translateY(-4px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .product img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .product h3 {
        margin: 0;
        font-size: 1.1rem;
        color: #2d4a2c;
    }

    .product button {
        margin-top: 10px;
        padding: 8px 12px;
        border: none;
        background: #4a6f47;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }

    .product button:hover {
        background: #3b5839;
    }

    .summary {
        background: #dfe9d9;
        border: 2px solid #b7c9b2;
        border-radius: 10px;
        padding: 25px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .summary h2 {
        margin-top: 0;
        color: #2d4a2c;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        padding-bottom: 5px;
        border-bottom: 1px solid #b7c9b2;
    }

    .remove-btn {
        background: #b94a48;
        padding: 4px 8px;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        border: none;
    }

    .remove-btn:hover {
        background: #953735;
    }
</style>
</head>
<body>

<div class="container">
    <div class="products">

        <!-- PRODUCT TEMPLATE -->
        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+1" alt="Product 1">
            <h3>Forest Product 1</h3>
            <button onclick="addToCart('Forest Product 1')">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+2" alt="Product 2">
            <h3>Forest Product 2</h3>
            <button onclick="addToCart('Forest Product 2')">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+3" alt="Product 3">
            <h3>Forest Product 3</h3>
            <button onclick="addToCart('Forest Product 3')">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+4" alt="Product 4">
            <h3>Forest Product 4</h3>
            <button onclick="addToCart('Forest Product 4')">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+5" alt="Product 5">
            <h3>Forest Product 5</h3>
            <button onclick="addToCart('Forest Product 5')">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200x120?text=Forest+6" alt="Product 6">
            <h3>Forest Product 6</h3>
            <button onclick="addToCart('Forest Product 6')">Add to Cart</button>
        </div>

    </div>

    <div class="summary">
        <h2>Order Summary & Pay</h2>
        <div id="cart"></div>
    </div>
</div>

<script>
    let cart = [];

    function addToCart(item) {
        cart.push(item);
        updateCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function updateCart() {
        const cartDiv = document.getElementById("cart");
        cartDiv.innerHTML = "";

        if (cart.length === 0) {
            cartDiv.innerHTML = "<p>Your cart is empty.</p>";
            return;
        }

        cart.forEach((item, index) => {
            cartDiv.innerHTML += `
                <div class="cart-item">
                    <span>${item}</span>
                    <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                </div>
            `;
        });
    }

    updateCart();
</script>

</body>
</html>
