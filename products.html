<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foresty Product Layout</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #e8f2e5;
        color: #2f3e2c;
    }

    .container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        padding: 30px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .product {
        background: #f4f8f2;
        border: 2px solid #c7d8c2;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product:hover {
        transform: translateY(-4px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .product img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .product h3 {
        margin: 0;
        font-size: 1.1rem;
        color: #2d4a2c;
    }

    .summary {
        background: #dfe9d9;
        border: 2px solid #b7c9b2;
        border-radius: 10px;
        padding: 25px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .summary h2 {
        margin-top: 0;
        color: #2d4a2c;
    }
</style>
</head>
<body>

<div class="container">
    <div class="products">

        <!-- PRODUCT TEMPLATE -->
        <div class="product">
            <a href="https://example.com/product1">
                <img src="https://via.placeholder.com/200x120?text=Forest+1" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

        <div class="product">
            <a href="https://example.com/product2">
                <img src="https://via.placeholder.com/200x120?text=Forest+2" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

        <div class="product">
            <a href="https://example.com/product3">
                <img src="https://via.placeholder.com/200x120?text=Forest+3" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

        <div class="product">
            <a href="https://example.com/product4">
                <img src="https://via.placeholder.com/200x120?text=Forest+4" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

        <div class="product">
            <a href="https://example.com/product5">
                <img src="https://via.placeholder.com/200x120?text=Forest+5" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

        <div class="product">
            <a href="https://example.com/product6">
                <img src="https://via.placeholder.com/200x120?text=Forest+6" alt="Product 1">
                <h3>Product 1</h3>
            </a>
        </div>

    </div>

    <div class="summary">
        <h2>Order Summary & Pay</h2>
        <p>Your selected items will appear here.</p>
    </div>
</div>

</body>
</html>
